name = "marktext-website"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Enables versioned preview URLs like
# https://pr-NNN-marktext-website.<subdomain>.workers.dev which the CI workflow
# parses out of `wrangler versions upload` output and posts back to PRs.
preview_urls = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Bind both apex and www as Worker Custom Domains. The route and DNS record are
# created automatically when the hostnames are managed by the configured
# Cloudflare account. If either hostname has an existing A/AAAA/CNAME record,
# delete it first or the deploy will refuse to bind. www → apex 301 redirect
# lives in src/middleware.ts.
[[routes]]
pattern = "marktext.me"
custom_domain = true

[[routes]]
pattern = "www.marktext.me"
custom_domain = true

[observability]
enabled = true
