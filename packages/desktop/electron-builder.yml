appId: com.marqen.desktop
productName: Marqen
directories:
  buildResources: build
  output: ../../dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.base.json,vitest.config.ts}'
  - '!test/**'
  - '!test-results/**'
  - '!patches/**'
  # ================================
  # Do not bundle these files
  # ================================
  - '!node_modules/dragula/resources'
  - '!node_modules/**/*.js.map'
  - '!node_modules/**/*.cjs.map'
  - '!node_modules/**/*.mjs.map'
  - '!node_modules/**/*.ts.map'
  - '!node_modules/**/*.d.ts.map'
  - '!node_modules/**/{test,tests,__tests__,demo,demos,example,examples,docs,benchmark,benchmarks}/**'
  - '!node_modules/**/{CHANGELOG,Changelog,changelog,HISTORY,History,README,readme,CONTRIBUTING,SECURITY,CODE_OF_CONDUCT}.{md,markdown,txt}'
  - '!node_modules/**/{tsconfig,vitest.config,jest.config,rollup.config,webpack.config,vite.config}.{json,js,ts,mjs,cjs}'
  - '!node_modules/**/.{eslintignore,eslintrc,prettierignore,prettierrc,npmignore,nvmrc}'
  - '!node_modules/**/*.{ts,tsx,flow}'
  - '!node_modules/@vscode/ripgrep/{jsconfig.json,*.md,LICENSE}'
  - '!node_modules/@vscode/ripgrep/lib/download.js'
  - '!node_modules/@vscode/ripgrep/lib/postinstall.js'
  - '!node_modules/font-list/libs/darwin/**'
  - '!node_modules/font-list/libs/linux/**'
  - '!node_modules/ced/vendor'
  - '!node_modules/ced/**'
  - '!node_modules/keytar/**'
  - '!node_modules/native-keymap/**'
  # Large source files
  - '!node_modules/mermaid/dist/mermaid.js'
  - '!node_modules/mermaid/dist/mermaid.min.js'
  - '!node_modules/mermaid/dist/mermaid.esm.min.mjs'
  - '!node_modules/katex/dist/katex.min.js'
  - '!node_modules/katex/dist/katex.mjs'
  # Don't bundle Linux build files
  - '!node_modules/**/{*.vcxproj,*.vcxproj.filters}'
  - '!node_modules/**/build/Release/{*.lib,*.exp,*.ilk,*.pdb,*.iobj,*.ipdb}'
  - '!node_modules/**/build/Release/obj'
  # Do not bundle development related files
  - '!eslint.config.js'
  - '!jsconfig.json'
  - '!docs/*'
extraResources:
  - from: build/icons
    to: icons # ends up at resources/icons/
    filter:
      - '*.ico'
  - from: static
    to: static
    filter:
      - '**/*'
      - '!locales/**/!(*.min).json'
npmRebuild: false
electronLanguages: # Avoid packaging all chromium locales since our app has in-built locales
  - en-US

asarUnpack:
  - resources/**
fileAssociations:
  - ext: md
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: markdown
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mmd
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdown
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdtxt
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
  - ext: mdtext
    name: Document
    description: Marqen document
    mimeType: text/markdown
    role: Editor
    icon: icons/md.ico
win:
  executableName: marqen
  artifactName: 'marqen-win-${arch}-${version}.${ext}'
  target:
    - target: 'nsis'
    - target: 'zip'
  icon: static/icon.ico
nsis:
  artifactName: 'marqen-win-${arch}-${version}-setup.${ext}'
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: true
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  artifactName: 'marqen-mac-${arch}-${version}.${ext}'
  entitlementsInherit: build/mac/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  icon: static/icon.icns
  notarize: false
  target:
    - dmg
    - zip
dmg:
  artifactName: 'marqen-mac-${arch}-${version}.${ext}'
  contents:
    - x: 410
      y: 240
      type: 'link'
      path: '/Applications'
    - x: 130
      y: 240
      type: 'file'
linux:
  artifactName: 'marqen-linux-${version}.${ext}'
  executableName: 'marqen'
  description: 'A clean local document editor with automatic formatting.'
  maintainer: 'Marqen Contributors'
  category: 'Office;TextEditor;Utility'
  mimeTypes:
    - 'text/markdown'
  icon: 'static/icon.png'
  desktop:
    entry:
      StartupWMClass: 'marqen'
      Keywords: 'marqen;document;editor;'
  target:
    - AppImage
    - snap
    - deb
    - rpm
    - tar.gz
  fileAssociations:
    - ext: 'md'
      name: 'Document'
      description: 'Marqen document'
    - ext: 'markdown'
      name: 'Document'
      description: 'Marqen document'
    - ext: 'mmd'
      name: 'Document'
      description: 'Marqen document'
    - ext: 'mdown'
      name: 'Document'
      description: 'Marqen document'
    - ext: 'mdtxt'
      name: 'Document'
      description: 'Marqen document'
    - ext: 'mdtext'
      name: 'Document'
      description: 'Marqen document'
